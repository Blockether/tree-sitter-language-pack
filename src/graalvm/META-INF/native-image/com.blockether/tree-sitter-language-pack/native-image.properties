# GraalVM native-image configuration for com.blockether/tree-sitter-language-pack.
# Auto-applied when this jar is on the native-image classpath. Pairs with the
# reachability-metadata.json in this directory (reflection / resources / FFM
# downcalls captured from the binding).
#
# Why each flag:
#   --enable-preview            the alef-generated binding is compiled with
#                               preview enabled, so its class files require it.
#   ForeignAPISupport           the binding calls the FFI lib via the Foreign
#                               Function & Memory API (java.lang.foreign).
#   initialize-at-run-time      NativeLib / TreeSitterLanguagePackRs load the
#                               native library (System.load) and build downcall
#                               handles at runtime, not at image-build time.
#
# NOTE: no -H:+SharedArenaSupport. The binding uses Arena.ofConfined() (per-call,
# closeable) and Arena.ofAuto() (long-lived, GC-managed) — never Arena.ofShared
# — because shared arenas are INCOMPATIBLE with Truffle runtime compilation
# (e.g. an image that also embeds GraalPy): native-image fails with "Arena.ofShared
# is not supported with runtime compilations". ofConfined/ofAuto need no flag.
#
# The native library itself is NOT embedded: at runtime it is loaded from
# com.blockether.treesitterlanguagepack.native.path / TSLP_NATIVE_PATH, the
# bundled natives/<rid>/ resource, or the Clojure resolver's download cache.
Args = --enable-preview \
       --enable-native-access=ALL-UNNAMED \
       -H:+UnlockExperimentalVMOptions \
       -H:+ForeignAPISupport \
       --initialize-at-run-time=dev.kreuzberg.treesitterlanguagepack.NativeLib,dev.kreuzberg.treesitterlanguagepack.TreeSitterLanguagePackRs
