name: Release & Deploy to Clojars

# Builds the JVM binding of tree-sitter-language-pack for ALL languages and
# deploys it to Clojars as com.blockether/tree-sitter-language-pack.
#
# Grammar sources come from upstream's curated parser-sources bundle (the same
# set kreuzberg-dev publishes from, which compiles cleanly on every platform —
# the raw per-repo clones used by clone_vendors.py do NOT, e.g. norg). The
# `clojure` grammar is then overridden with our own fork
# (Blockether/tree-sitter-clojure) so the pack uses our fork.
#
# Required repo/org secret: CLOJARS_DEPLOY_TOKEN (Clojars deploy token for the
# `blockether-deployer` account, scoped to the com.blockether group).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      languages:
        description: 'TSLP_LANGUAGES to statically compile (curated default; pass "all" for every grammar)'
        default: 'clojure,java,kotlin,scala,python,javascript,typescript,tsx,go,rust,c,cpp,csharp,ruby,php,swift,lua,bash,html,css,scss,json,yaml,toml,xml,sql,markdown,markdown_inline,dockerfile,regex'
        required: true

permissions:
  contents: write

env:
  # Curated set of the most popular languages (+ JVM/web/data formats a
  # Clojure shop parses). ~52MB native lib vs ~410MB for `all`. Override via the
  # workflow_dispatch input (e.g. "all") to widen. clojure always comes from
  # our fork (see the `sources` job).
  TSLP_LANGUAGES: ${{ github.event.inputs.languages || 'clojure,java,kotlin,scala,python,javascript,typescript,tsx,go,rust,c,cpp,csharp,ruby,php,swift,lua,bash,html,css,scss,json,yaml,toml,xml,sql,markdown,markdown_inline,dockerfile,regex' }}
  TSLP_LINK_MODE: static
  # Upstream's curated, known-to-compile source bundle for v1.10.3.
  PARSER_BUNDLE_URL: https://github.com/kreuzberg-dev/tree-sitter-language-pack/releases/download/v1.10.3/parser-sources-1.10.3.tar.zst
  CLOJURE_FORK: https://github.com/Blockether/tree-sitter-clojure

jobs:
  sources:
    name: Assemble parser sources (upstream bundle + our clojure fork)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Download upstream parser-sources bundle
        run: |
          curl -fsSL -o /tmp/ps.tar.zst "$PARSER_BUNDLE_URL"
          tar --zstd -xf /tmp/ps.tar.zst   # extracts ./parsers/<lang>/...
          echo "languages in bundle: $(ls parsers | wc -l)"
          test -f parsers/clojure/src/parser.c

      - name: Override clojure grammar with our fork
        run: |
          git clone --depth 1 "$CLOJURE_FORK" /tmp/clj
          rm -rf parsers/clojure
          mkdir -p parsers/clojure
          cp -r /tmp/clj/src parsers/clojure/src
          cp -r /tmp/clj/queries parsers/clojure/queries
          echo "=== clojure now sourced from $(git -C /tmp/clj rev-parse HEAD) ==="
          ls -R parsers/clojure

      - uses: actions/upload-artifact@v4
        with:
          name: parser-sources
          path: parsers
          retention-days: 1
          if-no-files-found: error

  natives:
    name: Build native FFI (${{ matrix.rid }})
    needs: sources
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x86_64
            lib: libts_pack_core_ffi.so
          - os: ubuntu-24.04-arm
            rid: linux-aarch64
            lib: libts_pack_core_ffi.so
          - os: macos-14
            rid: macos-arm64
            lib: libts_pack_core_ffi.dylib
          - os: macos-13
            rid: macos-x86_64
            lib: libts_pack_core_ffi.dylib
          - os: windows-latest
            rid: windows-x86_64
            lib: ts_pack_core_ffi.dll
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Download assembled parser sources
        uses: actions/download-artifact@v4
        with:
          name: parser-sources
          path: parsers

      - name: Build FFI library (TSLP_LANGUAGES=${{ env.TSLP_LANGUAGES }})
        run: cargo build --locked -p ts-pack-core-ffi --release

      - name: Stage native lib under its rid
        shell: bash
        run: |
          mkdir -p "out/${{ matrix.rid }}"
          cp "target/release/${{ matrix.lib }}" "out/${{ matrix.rid }}/${{ matrix.lib }}"
          ls -la "out/${{ matrix.rid }}"

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: out/${{ matrix.rid }}/${{ matrix.lib }}
          if-no-files-found: error

  release:
    name: Assemble fat jar & deploy to Clojars
    needs: natives
    runs-on: ubuntu-latest
    steps:
      # Check out the triggering ref (the tag for v* pushes) so the deployed
      # artifact corresponds to the tag, not to whatever is currently on main.
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Download native libs
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: natives-staging

      - name: Stage natives into resources
        shell: bash
        run: |
          dest=packages/java/src/main/resources/natives
          mkdir -p "$dest"
          # download-artifact extracts each artifact under
          # natives-staging/native-<rid>/... (subdirs may be preserved), so locate
          # the actual library file recursively rather than globbing the top level.
          for d in natives-staging/native-*; do
            [ -d "$d" ] || continue
            rid="${d#natives-staging/native-}"
            mkdir -p "$dest/$rid"
            find "$d" -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' \) \
              -exec cp {} "$dest/$rid/" \;
          done
          echo "=== bundled natives ==="
          find "$dest" -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' \) | sort

      # Compute the deploy version once and reuse it everywhere. For tag pushes
      # this is the tag minus the leading `v`; for manual runs github.ref_name is
      # a branch (e.g. main), so fall back to a unique manual marker.
      - name: Compute deploy version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="manual-${GITHUB_RUN_ID}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Deploy version: $V"

      - name: Check if version exists on Clojars
        id: check-clojars
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://repo.clojars.org/com/blockether/tree-sitter-language-pack/$VERSION/tree-sitter-language-pack-$VERSION.jar")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION already exists on Clojars — skipping deploy"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & Deploy to Clojars
        if: steps.check-clojars.outputs.exists != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CLOJARS_USERNAME: blockether-deployer
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_DEPLOY_TOKEN }}
        run: clojure -T:build deploy

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
